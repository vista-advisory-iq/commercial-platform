# Render Blueprint — one free web service (Django serving the built React app)
# plus a free PostgreSQL database. Deploy by connecting this repo on render.com.
services:
  - type: web
    name: vap-commercial
    runtime: docker
    plan: free
    healthCheckPath: /admin/login/
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: vap-db
          property: connectionString
      # Superuser created automatically on first deploy from these three vars.
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@vap.local
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false   # set this in the Render dashboard before deploying

databases:
  - name: vap-db
    plan: free
